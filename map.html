<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
      .scene {
        width: 200px;
        height: 260px;
        border: 1px solid #CCC;
        margin: 40px 0;
        perspective: 600px;
    }  
    .card {
        position: relative;
        width: 100%;
        height: 100%;
        cursor: pointer;
        transform-style: preserve-3d;
        transform-origin: center right;
        transition: transform 1s;
    }
    .card.is-flipped {
        transform: translateX(-100%) rotateY(-180deg);
    } 
    .card__face {
        position: absolute;
        width: 100%;
        height: 100%;
        line-height: 260px;
        color: white;
        text-align: center;
        font-weight: bold;
        font-size: 40px;
        backface-visibility: hidden;
    }
    .card__face--front {
        background: red;
    }
    .card__face--back {
        background: blue;
        transform: rotateY(180deg);
    }
    </style>
    <title>Maps</title>
</head>
<body style="background-color: rgb(236, 236, 236);">
    <div class="map" style="width: 100%; height: 400px;">
    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&callback=initMap&libraries=&v=weekly&channel=2" async></script>
</body>
<div class="scene scene--card">
  <div class="card">
    <div class="card__face card__face--front">front</div>
    <div class="card__face card__face--back">back</div>
  </div>
</div>
<script>
    function initMap() {
        // The location of Uluru
        const nairobi = { lat: -1.28333, lng: 36.81667 };
        // The map, centered at Uluru
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 12,
          center: nairobi,
        });
        // The marker, positioned at Uluru
        const marker = new google.maps.Marker({
          position: nairobi,
          map: map,
        });
    }

    var card = document.querySelector('.card');
    card.addEventListener( 'click', function() {
        card.classList.toggle('is-flipped');
    });
</script>
</html>
